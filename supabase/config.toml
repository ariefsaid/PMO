# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "pmo-portal"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. `public` and `graphql_public` schemas are included by default.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000
# Controls whether new tables, views, sequences and functions created in the `public` schema by
# `postgres` are reachable through the Data API roles without explicit GRANTs. Opted IN to the
# secure default (false) ‚Äî matches the production runbook (NFR-AUTHF-CONF-006, auth-floor ¬ß7.6).
#
# ACTIVATED (2026-07-07, audit finding #4): the 2026-07-04 deviation noted above blocked activation
# because no migration issued an explicit GRANT ‚Äî every existing table relied entirely on the
# implicit auto-expose default, so flipping this naked would have stripped ALL DML access
# ("permission denied for table profiles"). That is now fixed: migration 0075_explicit_api_grants.sql
# mirrors, per table, the EXACT `authenticated`/`anon` privileges that were previously implicit
# (byte-for-byte, captured from `information_schema.role_table_grants`/`role_column_grants` on a
# db reset taken with this flag still off) ‚Äî zero behavior change for existing tables. Only FUTURE
# tables stop being auto-exposed (the actual security win; pgTAP 0132_auto_expose_lockdown proves
# both halves: existing access unchanged, new tables get zero privileges by default).
auto_expose_new_tables = false

[api.tls]
# Enable HTTPS endpoints locally using a self-signed certificate.
enabled = false
# Paths to self-signed certificate pair.
# cert_path = "../certs/my-cert.pem"
# key_path = "../certs/my-key.pem"

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# Maximum amount of time to wait for health check when starting the local database.
health_timeout = "2m"
# The database major version to use. This has to be the same as your remote database's. Run `SHOW
# server_version;` on the remote database to check.
major_version = 17

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum number of client connections allowed.
max_client_conn = 100

# [db.vault]
# secret_key = "env(SECRET_VALUE)"

[db.migrations]
# If disabled, migrations will be skipped during a db push or reset.
enabled = true
# Specifies an ordered list of schema files that describe your database.
# Supports glob patterns relative to supabase directory: "./schemas/*.sql"
schema_paths = []

[db.seed]
# If enabled, seeds the database after migrations during a db reset.
enabled = true
# Specifies an ordered list of seed files to load during db reset.
# Supports glob patterns relative to supabase directory: "./seeds/*.sql"
sql_paths = ["./seed.sql"]

[db.network_restrictions]
# Enable management of network restrictions.
enabled = false
# List of IPv4 CIDR blocks allowed to connect to the database.
# Defaults to allow all IPv4 connections. Set empty array to block all IPs.
allowed_cidrs = ["0.0.0.0/0"]
# List of IPv6 CIDR blocks allowed to connect to the database.
# Defaults to allow all IPv6 connections. Set empty array to block all IPs.
allowed_cidrs_v6 = ["::/0"]

# Uncomment to reject non-secure connections to the database.
# [db.ssl_enforcement]
# enabled = true

[realtime]
enabled = true
# Bind realtime via either IPv4 or IPv6. (default: IPv4)
# ip_version = "IPv6"
# The maximum length in bytes of HTTP request headers. (default: 4096)
# max_header_length = 4096

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
# OpenAI API Key to use for Supabase AI in the Supabase Studio.
openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server. Emails sent with the local dev setup are not actually sent - rather, they
# are monitored, and you can view the emails that would have been sent from the web interface.
[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324
# Uncomment to expose additional ports for testing user applications that send emails.
# smtp_port = 54325
# pop3_port = 54326
# admin_email = "admin@email.com"
# sender_name = "Admin"

[storage]
# Re-enabled 2026-06-12 for the document-file-upload issue (OD-DOC-1; Phase 0 health gate
# in docs/plans/2026-06-12-document-file-upload.md). Historical health-check flake is the
# named abort condition ‚Äî if `supabase db reset` hangs or /storage/v1/health is non-200, STOP.
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB"). Mirrors MAX_FILE_SIZE_BYTES (OD-DOC-5 knob).
file_size_limit = "5MiB"

[storage.buckets.project-documents]
public = false
file_size_limit = "5MiB"
allowed_mime_types = [
  "application/pdf",
  "image/png", "image/jpeg", "image/webp",
  "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  "application/vnd.openxmlformats-officedocument.presentationml.presentation",
  "image/vnd.dxf", "application/dxf", "application/acad",
  "text/csv", "text/plain",
]

# Allow connections via S3 compatible clients
[storage.s3_protocol]
enabled = true

# Image transformation API is available to Supabase Pro plan.
# [storage.image_transformation]
# enabled = true

# Store analytical data in S3 for running ETL jobs over Iceberg Catalog
# This feature is only available on the hosted platform.
[storage.analytics]
enabled = false
max_namespaces = 5
max_tables = 10
max_catalogs = 2

# Analytics Buckets is available to Supabase Pro plan.
# [storage.analytics.buckets.my-warehouse]

# Store vector embeddings in S3 for large and durable datasets
[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

# Vector Buckets is available to Supabase Pro plan.
# [storage.vector.buckets.documents-openai]

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:3000"
# The public URL that Auth serves on. Defaults to the API external URL with `/auth/v1` appended.
# external_url = ""
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
# http://127.0.0.1:3000/** and http://localhost:3000/** added for the auth-production-floor
# reset/invite flows (FR-AUTHF-015/050, D-AUTHF-8) ‚Äî resetPasswordForEmail's redirectTo is
# origin + '/update-password', a DIFFERENT URL from the bare site_url above, so GoTrue requires it
# on this allowlist (AC-AUTHF-005, AC-AUTHF-020). BOTH origins are needed: the app's own dev/e2e
# server (Vite + Playwright's playwright.config.ts baseURL/webServer.url) runs at
# http://localhost:3000, while site_url above is the 127.0.0.1 loopback form ‚Äî GoTrue only
# fell back to site_url (dropping the /update-password path) when the browser's real
# window.location.origin (localhost:3000) wasn't itself on the allowlist. Local-only; the cloud
# runbook (docs/environments.md ¬ß7.2) points this allowlist at the deployed HTTPS origin(s) only
# (no wildcard, no localhost, in prod, per NFR-AUTHF-CONF-003).
additional_redirect_urls = ["https://127.0.0.1:3000", "http://127.0.0.1:3000/**", "http://localhost:3000/**"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# JWT issuer URL. If not set, defaults to auth.external_url.
# jwt_issuer = ""
# Path to JWT signing key. DO NOT commit your signing keys file to git.
# signing_keys_path = "./signing_keys.json"
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous sign-ins to your project.
enable_anonymous_sign_ins = false
# Allow/disallow testing manual linking of accounts
enable_manual_linking = false
# Passwords shorter than this value will be rejected as weak. Minimum 6, recommended 8 or more.
minimum_password_length = 10
# Passwords that do not meet the following requirements will be rejected as weak. Supported values
# are: `letters_digits`, `lower_upper_letters_digits`, `lower_upper_letters_digits_symbols`
password_requirements = "lower_upper_letters_digits"

# Configure passkey sign-ins.
# [auth.passkey]
# enabled = false

# Configure WebAuthn relying party settings (required when passkey is enabled).
# [auth.webauthn]
# rp_display_name = "Supabase"
# rp_id = "localhost"
# rp_origins = ["http://127.0.0.1:3000"]

[auth.rate_limit]
# Number of emails that can be sent per hour. Requires auth.email.smtp to be enabled.
email_sent = 2
# Number of SMS messages that can be sent per hour. Requires auth.sms to be enabled.
sms_sent = 30
# Number of anonymous sign-ins that can be made per hour per IP address. Requires enable_anonymous_sign_ins = true.
anonymous_users = 30
# Number of sessions that can be refreshed in a 5 minute interval per IP address.
# Raised for the CI/local e2e stack: the Playwright suite does a real password sign-in per test
# (no storageState reuse) under fullyParallel + retries=2, all from ONE runner IP, so the enlarged
# suite blows past GoTrue's default per-IP limits and gets 429-bounced to /login. These limits govern
# only the LOCAL/CI Supabase stack ‚Äî production is a separate Supabase Cloud project, unaffected.
token_refresh = 1000
# Number of sign up and sign-in requests that can be made in a 5 minute interval per IP address (excludes anonymous users).
sign_in_sign_ups = 1000
# Number of OTP / Magic link verifications that can be made in a 5 minute interval per IP address.
token_verifications = 1000
# Number of Web3 logins that can be made in a 5 minute interval per IP address.
web3 = 30

# Configure one of the supported captcha providers: `hcaptcha`, `turnstile`.
# [auth.captcha]
# enabled = true
# provider = "hcaptcha"
# secret = ""

[auth.email]
# Allow/disallow new user signups via email to your project.
enable_signup = true
# If enabled, a user will be required to confirm any email change on both the old, and new email
# addresses. If disabled, only the new email is required to confirm.
double_confirm_changes = true
# If enabled, users need to confirm their email address before signing in.
enable_confirmations = false
# If enabled, users will need to reauthenticate or have logged in recently to change their password.
secure_password_change = false
# Controls the minimum amount of time that must pass before sending another signup confirmation or password reset email.
max_frequency = "1s"
# Number of characters used in the email OTP.
otp_length = 6
# Number of seconds before the email OTP expires (defaults to 1 hour).
otp_expiry = 3600

# Production auth email via Resend over SMTP (D-AUTHF-1; NFR-AUTHF-CONF-001/002; auth-floor ¬ß7.1a).
# LOCAL TEMPLATE ONLY ‚Äî kept commented so local dev keeps using the Inbucket testing server on :54324
# (the auth e2e ‚Äî AC-AUTH-005, AC-AUTHF-005, AC-AUTHF-020 ‚Äî polls Mailpit there). To test real SMTP
# delivery locally, uncomment, set RESEND_API_KEY in .env, and `supabase stop && supabase start`.
# CLOUD is configured in the dashboard with the LITERAL key (no env()) ‚Äî see docs/environments.md
# "Production auth configuration" (¬ß7.1b). No domain is hardcoded in this repo (D-AUTHF-2).
# [auth.email.smtp]
# enabled      = true
# host         = "smtp.resend.com"                  # confirm against Resend's current SMTP docs at provisioning
# port         = 465                                 # 465 (SSL) or 587 (STARTTLS) per Resend docs
# user         = "resend"                            # Resend SMTP user; password = the API key
# pass         = "env(RESEND_API_KEY)"               # LOCAL ONLY ‚Äî config.toml resolves this from the dev env
# admin_email  = "<sender-address>@<verified-domain>"# CONFIG VALUE ‚Äî no domain hardcoded in repo
# sender_name  = "<Product or Org name>"             # CONFIG VALUE

# Uncomment to customize email template
# [auth.email.template.invite]
# subject = "You have been invited"
# content_path = "./supabase/templates/invite.html"

# Uncomment to customize notification email template
# [auth.email.notification.password_changed]
# enabled = true
# subject = "Your password has been changed"
# content_path = "./templates/password_changed_notification.html"

[auth.sms]
# Allow/disallow new user signups via SMS to your project.
enable_signup = false
# If enabled, users need to confirm their phone number before signing in.
enable_confirmations = false
# Template for sending OTP to users
template = "Your code is {{ .Code }}"
# Controls the minimum amount of time that must pass before sending another sms otp.
max_frequency = "5s"

# Use pre-defined map of phone number to OTP for testing.
# [auth.sms.test_otp]
# 4152127777 = "123456"

# Configure logged in session timeouts.
# [auth.sessions]
# Force log out after the specified duration.
# timebox = "24h"
# Force log out if the user has been inactive longer than the specified duration.
# inactivity_timeout = "8h"

# This hook runs before a new user is created and allows developers to reject the request based on the incoming user object.
# [auth.hook.before_user_created]
# enabled = true
# uri = "pg-functions://postgres/auth/before-user-created-hook"

# This hook runs before a token is issued and allows you to add additional claims based on the authentication method used.
# [auth.hook.custom_access_token]
# enabled = true
# uri = "pg-functions://<database>/<schema>/<hook_name>"

# Configure one of the supported SMS providers: `twilio`, `twilio_verify`, `messagebird`, `textlocal`, `vonage`.
[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
# DO NOT commit your Twilio auth token to git. Use environment variable substitution instead:
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

# Multi-factor-authentication is available to Supabase Pro plan.
[auth.mfa]
# Control how many MFA factors can be enrolled at once per user.
max_enrolled_factors = 10

# Control MFA via App Authenticator (TOTP)
[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

# Configure MFA via Phone Messaging
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

# Configure MFA via WebAuthn
# [auth.mfa.web_authn]
# enroll_enabled = true
# verify_enabled = true

# Use an external OAuth provider. The full list of providers are: `apple`, `azure`, `bitbucket`,
# `discord`, `facebook`, `github`, `gitlab`, `google`, `keycloak`, `linkedin_oidc`, `notion`, `twitch`,
# `twitter`, `x`, `slack`, `spotify`, `workos`, `zoom`.

# Microsoft Entra ID ("Sign in with Microsoft") ‚Äî the LoginPage "Continue with Microsoft" button
# (signInWithOAuth provider `azure`). LOCAL TEMPLATE ONLY, committed DISABLED: enabling requires the
# Entra app's client id/secret in the dev env (.env: SUPABASE_AUTH_EXTERNAL_AZURE_CLIENT_ID /
# SUPABASE_AUTH_EXTERNAL_AZURE_SECRET ‚Äî never committed, D-AUTHF-2 stance), then
# `supabase stop && supabase start`. CLOUD is configured in the dashboard (Authentication ‚Üí
# Sign In / Providers ‚Üí Azure) ‚Äî see docs/environments.md "Microsoft (Entra ID) OAuth provider".
# redirect_uri pins the LOCALHOST form (not 127.0.0.1): Entra's Web platform only registers
# plain-http redirect URIs for `localhost`, so the registered URI is
# http://localhost:54321/auth/v1/callback and GoTrue must present exactly that string.
# url = multi-tenant `common` endpoint ‚Äî any org's work/school account may authenticate; org
# membership/authorization stays enforced app-side (invite/profiles/RLS), not by the tenant.
[auth.external.azure]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_AZURE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_AZURE_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"
url = "https://login.microsoftonline.com/common"
skip_nonce_check = false
email_optional = false

[auth.external.apple]
enabled = false
client_id = ""
# DO NOT commit your OAuth provider secret to git. Use environment variable substitution instead:
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
# Overrides the default auth callback URL derived from auth.external_url.
redirect_uri = ""
# Overrides the default auth provider URL. Used to support self-hosted gitlab, single-tenant Azure,
# or any other third-party OIDC providers.
url = ""
# If enabled, the nonce check will be skipped. Required for local sign in with Google auth.
skip_nonce_check = false
# If enabled, it will allow the user to successfully authenticate when the provider does not return an email address.
email_optional = false

# Allow Solana wallet holders to sign in to your project via the Sign in with Solana (SIWS, EIP-4361) standard.
# You can configure "web3" rate limit in the [auth.rate_limit] section and set up [auth.captcha] if self-hosting.
[auth.web3.solana]
enabled = false

# Use Firebase Auth as a third-party provider alongside Supabase Auth.
[auth.third_party.firebase]
enabled = false
# project_id = "my-firebase-project"

# Use Auth0 as a third-party provider alongside Supabase Auth.
[auth.third_party.auth0]
enabled = false
# tenant = "my-auth0-tenant"
# tenant_region = "us"

# Use AWS Cognito (Amplify) as a third-party provider alongside Supabase Auth.
[auth.third_party.aws_cognito]
enabled = false
# user_pool_id = "my-user-pool-id"
# user_pool_region = "us-east-1"

# Use Clerk as a third-party provider alongside Supabase Auth.
[auth.third_party.clerk]
enabled = false
# Obtain from https://clerk.com/setup/supabase
# domain = "example.clerk.accounts.dev"

# OAuth server configuration
[auth.oauth_server]
# Enable OAuth server functionality
enabled = false
# Path for OAuth consent flow UI
authorization_url_path = "/oauth/consent"
# Allow dynamic client registration
allow_dynamic_registration = false

[edge_runtime]
# Disabled for the backend-foundation issue: no Edge Functions in scope; the local Deno image cannot
# reach deno.land in this environment and its failed health check tears down the whole stack.
enabled = false
# Supported request policies: `oneshot`, `per_worker`.
# `per_worker` (default) ‚Äî enables hot reload during local development.
# `oneshot` ‚Äî fallback mode if hot reload causes issues (e.g. in large repos or with symlinks).
policy = "per_worker"
# Port to attach the Chrome inspector for debugging edge functions.
inspector_port = 8083
# The Deno major version to use.
deno_version = 2

# [edge_runtime.secrets]
# secret_key = "env(SECRET_VALUE)"

# ‚îÄ‚îÄ Edge Function: compose-view ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: the handler verifies the JWT itself to return a typed 401
# body. Supabase's built-in JWT gate returns a non-typed 401 which would bypass
# the handler's structured error contract (ADR-0039 decision 2, AC-AS-004).
[functions.compose-view]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: agent-chat ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: the handler verifies the JWT itself to return a typed 401
# and to stream a typed terminal `status` event (ADR-0040 A1, FR-AR-013).
[functions.agent-chat]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: agent-dispatch ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: this endpoint is invoked once per minute by the pg_cron job (migration
# 0048) via net.http_post ‚Äî the caller is Postgres, not a browser/end-user JWT. The handler
# verifies the bearer itself (it MUST equal SUPABASE_SERVICE_ROLE_KEY, since this endpoint mints
# owner JWTs) and returns a typed 401 otherwise (ADR-0044 ¬ß2/¬ß3, NFR-AAN-SEC-001).
[functions.agent-dispatch]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: admin-invite-user ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: the handler verifies the JWT itself (getUser under a caller-JWT client)
# to return a typed 401/403 ‚Äî the service-role key is never exercised for an unauthorized
# caller (FR-INV-004 SHALL, ops-admin-surface S3).
[functions.admin-invite-user]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: telegram-notify ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: invoked every 2 minutes by the pg_cron job (migration 0071) via
# net.http_post ‚Äî the caller is Postgres, not a browser/end-user JWT. The handler verifies
# the bearer itself (it MUST equal SUPABASE_SERVICE_ROLE_KEY) and returns a typed 401
# otherwise (observability floor, NFR-OF-SEC-002).
[functions.telegram-notify]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: health ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: public, anonymous uptime probe (observability floor, FR-OF-015/016/017)
# ‚Äî no auth, no DB, no secret read.
[functions.health]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: adapter-dispatch ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = true: invoked by the browser-client `supabase.functions.invoke(...)` path, so
# Supabase must enforce the caller JWT before the handler binds org context from that JWT
# (FR-EAS-024/033). Unlike cron/service endpoints, this function should not self-bypass auth.
[functions.adapter-dispatch]
verify_jwt = true

# ‚îÄ‚îÄ Edge Function: clickup-onboard ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: an operator onboarding action, not a browser-JWT path. The handler verifies
# the bearer itself (it MUST equal SUPABASE_SERVICE_ROLE_KEY, constant-time) ‚Äî the sole trust
# boundary (same stance as agent-dispatch/telegram-notify). Provisions a project‚ÜîList binding,
# push-seeds PMO tasks, or pull-adopts ClickUp tasks (FR-CUA-063, AC-CUA-050..053).
[functions.clickup-onboard]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: clickup-webhook ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: a PUBLIC, unauthenticated surface ‚Äî ClickUp (not a browser) POSTs task
# webhooks here. The X-Signature HMAC-SHA256 of the raw body (keyed by CLICKUP_WEBHOOK_SECRET) is
# the SOLE trust boundary (FR-CUA-041, NFR-CUA-SEC-002): an absent/invalid signature ‚áí 401 with no
# side effect (STRIDE spoofing/tampering). The handler verifies the signature itself before any apply.
[functions.clickup-webhook]
verify_jwt = false

# ‚îÄ‚îÄ Edge Function: clickup-sweep ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
# verify_jwt = false: invoked by the pg_cron job (migration 0092) via net.http_post ‚Äî the caller is
# Postgres, not a browser/end-user JWT. The handler verifies the bearer itself (it MUST equal
# SUPABASE_SERVICE_ROLE_KEY, constant-time) ‚Äî same stance as agent-dispatch/telegram-notify. The
# reconciliation sweep: the safety net that catches webhook gaps (FR-CUA-045, AC-CUA-043/044).
# Registered-but-idle per the 0048 precedent until the operator sets the dispatch GUCs.
[functions.clickup-sweep]
verify_jwt = false

[analytics]
enabled = true
port = 54327
# Configure one of the supported backends: `postgres`, `bigquery`.
backend = "postgres"

# Experimental features may be deprecated any time
[experimental]
# Configures Postgres storage engine to use OrioleDB (S3)
orioledb_version = ""
# Configures S3 bucket URL, eg. <bucket_name>.s3-<region>.amazonaws.com
s3_host = "env(S3_HOST)"
# Configures S3 bucket region, eg. us-east-1
s3_region = "env(S3_REGION)"
# Configures AWS_ACCESS_KEY_ID for S3 bucket
s3_access_key = "env(S3_ACCESS_KEY)"
# Configures AWS_SECRET_ACCESS_KEY for S3 bucket
s3_secret_key = "env(S3_SECRET_KEY)"

# [experimental.pgdelta]
# When enabled, pg-delta becomes the active engine for supported schema flows.
# enabled = false
# Directory under `supabase/` where declarative files are written.
# declarative_schema_path = "./database"
# JSON string passed through to pg-delta SQL formatting.
# format_options = "{\"keywordCase\":\"upper\",\"indent\":2,\"maxWidth\":80,\"commaStyle\":\"trailing\"}"
