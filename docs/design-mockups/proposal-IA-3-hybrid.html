<!DOCTYPE html>
<!--
  ============================================================================
  PROPOSAL · IA-3 HYBRID — rail + page-drill + ⌘K + tabs
  ============================================================================
  Product : PMO Portal — SaaS for contract- & project-based organizations
  Direction: OWNER-CHOSEN final design direction. A hybrid that takes IA-1's
             LOOK & FEEL (the persistent ~224px left rail, the top context bar,
             the role switcher, and the rich list rows with inline lifecycle /
             status indicators) and grafts on IA-2's NAVIGATION MODEL (a ⌘K
             command palette and a persistent, closable tabbed workspace).

  TOKENS COPIED VERBATIM: the entire :root custom-property block (Token System A,
  shadcn-vue HSL — --background/--foreground/--card/--primary/--secondary/--muted/
  --accent/--destructive/--warning/--success/--border/--input/--ring/--radius/
  --rail-w/--header-h, etc.) AND the type-scale classes (.text-2xl … .muted) were
  copied character-for-character from the RIS reference
  /Users/ariefsaid/Coding/RIS-portal-2/docs/design-mockups/sales-pipeline-reference.html
  (cross-checked against proposal-IA-1-rail-masterdetail.html, which copied the
  identical block). The component patterns (KPI band, toolbar, data table, kanban
  card, lifecycle stepper, status badges, tooltip, toast, command palette) reuse
  the same reference classes so the LOOK matches the RIS reference exactly. No
  colors were re-picked.

  HOW THE HYBRID MERGES IA-1 (look/lists) WITH IA-2 (drill-down):
   • KEEPS IA-1's left-rail shell verbatim — grouped Overview / Sales / Delivery /
     Workforce nav, brand block, role switcher, top context bar, greyed stubs.
   • KEEPS IA-1's rich list rows: every index row/card carries inline lifecycle
     pips, status badges, owner avatars, weighted-value and progress affordances.
   • REMOVES IA-1's split master-detail. There is NO side-by-side list+detail pane.
     Every record surface is INDEX-FIRST (a full-width list/index with VIEW
     TOGGLES); clicking a row DRILLS INTO A FULL-PAGE DETAIL VIEW (a route/page
     change), returnable via breadcrumb + an explicit Back affordance.
   • ADDS IA-2's ⌘K command palette in the header — keyboard nav + "open record",
     fully reachable by keyboard (⌘K / Ctrl-K, arrow keys, Enter, Esc).
   • ADDS IA-2's tabbed workspace — opening a record adds a persistent, closable
     tab; re-opening the same record re-focuses its tab. Detail pages still work
     as standalone full pages; tabs are an enhancement layer on top, not a
     prerequisite for the drill-down.
   • View toggles per surface: Pipeline = Kanban (default) + Table; Procurement =
     Table (default) + by-stage Board; Projects = Table (default) + Cards;
     Timesheets = Weekly grid + Approvals queue; Dashboard = no toggle.
  ============================================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light" />
<title>PMO Portal — IA-3 Hybrid · rail + page-drill + ⌘K + tabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     PMO Portal Design Tokens — shadcn-vue HSL (Token System A)
     COPIED VERBATIM from RIS sales-pipeline-reference.html :root.
     ============================================================ */
  :root {
    --background: 0 0% 100%;
    --foreground: 240 10% 3.9%;
    --card: 0 0% 100%;
    --card-foreground: 240 10% 3.9%;
    --popover: 0 0% 100%;
    --popover-foreground: 240 10% 3.9%;
    --primary: 221.2 83.2% 53.3%;
    --primary-foreground: 0 0% 98%;
    --secondary: 240 4.8% 95.9%;
    --secondary-foreground: 240 5.9% 10%;
    --muted: 240 4.8% 95.9%;
    --muted-foreground: 240 3.8% 46.1%;
    --accent: 240 4.8% 95.9%;
    --accent-foreground: 240 5.9% 10%;
    --destructive: 0 84.2% 60.2%;
    --destructive-foreground: 0 0% 98%;
    --warning: 43 96% 56%;
    --warning-foreground: 22 78% 26%;
    --success: 142 71% 45%;
    --success-foreground: 0 0% 98%;
    --border: 240 5.9% 90%;
    --input: 240 5.9% 90%;
    --ring: 221.2 83.2% 53.3%;
    --radius: 0.5rem;

    /* sidebar rail (from IA-1) + workspace tab strip (from IA-2) */
    --rail-w: 224px;
    --header-h: 56px;
    --tabstrip-h: 40px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
    line-height: 1.45;
  }

  /* ---------- Type scale (COPIED VERBATIM from reference) ---------- */
  .text-2xl { font-size: 24px; line-height: 1.2; }
  .text-xl  { font-size: 20px; line-height: 1.25; }
  .text-lg  { font-size: 18px; line-height: 1.3; }
  .text-sm  { font-size: 14px; }
  .text-xs  { font-size: 12px; }
  .font-bold { font-weight: 700; }
  .font-semibold { font-weight: 600; }
  .font-medium { font-weight: 500; }
  .font-mono { font-family: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace; }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .muted { color: hsl(var(--muted-foreground)); }

  /* =========================================================
     APP SHELL — IA-1 rail + header, PLUS an IA-2 tab strip row
     grid: [rail | header]   [rail | tabstrip]   [rail | main]
     ========================================================= */
  .app {
    display: grid;
    grid-template-columns: var(--rail-w) 1fr;
    grid-template-rows: var(--header-h) var(--tabstrip-h) 1fr;
    grid-template-areas:
      "rail header"
      "rail tabstrip"
      "rail main";
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  /* ---------- Sidebar rail (from IA-1, verbatim structure) ---------- */
  .rail {
    grid-area: rail;
    background: hsl(var(--card));
    border-right: 1px solid hsl(var(--border));
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .rail-brand {
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    border-bottom: 1px solid hsl(var(--border));
    flex-shrink: 0;
  }
  .rail-logo {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: hsl(var(--primary));
    color: hsl(var(--primary-foreground));
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .rail-brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
  .rail-brand-sub { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: -2px; }

  .rail-nav { padding: 10px 10px; overflow-y: auto; flex: 1; min-height: 0; }
  .rail-group-label {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: hsl(var(--muted-foreground));
    padding: 14px 8px 6px;
  }
  .rail-item {
    display: flex; align-items: center; gap: 11px;
    height: 36px; padding: 0 10px;
    border-radius: calc(var(--radius) - 2px);
    color: hsl(var(--foreground));
    font-size: 13.5px; font-weight: 500;
    cursor: pointer; user-select: none;
    text-decoration: none;
    transition: background .12s ease, color .12s ease;
    width: 100%; border: none; background: transparent; text-align: left;
    font-family: inherit;
  }
  .rail-item:hover { background: hsl(var(--accent)); }
  .rail-item.active {
    background: hsl(var(--primary) / 0.1);
    color: hsl(var(--primary));
    font-weight: 600;
  }
  .rail-item svg { width: 17px; height: 17px; flex-shrink: 0; stroke-width: 2; }
  .rail-item .badge-count {
    margin-left: auto;
    font-size: 11px; font-weight: 600;
    background: hsl(var(--secondary));
    color: hsl(var(--muted-foreground));
    padding: 1px 7px; border-radius: 999px;
  }
  .rail-item.active .badge-count { background: hsl(var(--primary) / 0.15); color: hsl(var(--primary)); }
  .rail-item.stub { color: hsl(var(--muted-foreground)); opacity: .65; cursor: not-allowed; }
  .rail-item.stub:hover { background: transparent; }
  .rail-item.stub .stub-tag {
    margin-left: auto; font-size: 9.5px; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase; color: hsl(var(--muted-foreground));
    background: hsl(var(--secondary)); border: 1px solid hsl(var(--border));
    padding: 1px 5px; border-radius: 5px;
  }

  .rail-foot {
    border-top: 1px solid hsl(var(--border));
    padding: 10px;
    flex-shrink: 0;
  }

  /* ---------- Header / top context bar (from IA-1) ---------- */
  .header {
    grid-area: header;
    background: hsl(var(--background));
    border-bottom: 1px solid hsl(var(--border));
    display: flex; align-items: center;
    gap: 14px;
    padding: 0 20px;
    z-index: 30;
  }
  .breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 13.5px; min-width: 0; }
  .breadcrumb a, .breadcrumb button {
    color: hsl(var(--muted-foreground)); text-decoration: none; white-space: nowrap;
    border: none; background: transparent; font: inherit; cursor: pointer; padding: 0;
  }
  .breadcrumb a:hover, .breadcrumb button:hover { color: hsl(var(--foreground)); }
  .breadcrumb .sep { color: hsl(var(--muted-foreground)); opacity: .5; }
  .breadcrumb .sep svg { width: 14px; height: 14px; }
  .breadcrumb .current { font-weight: 600; color: hsl(var(--foreground)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40ch; }

  .header-spacer { flex: 1; }

  /* ⌘K affordance in the header (from IA-2) */
  .cmdk {
    display: flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 9px 0 11px;
    min-width: 250px;
    border: 1px solid hsl(var(--input));
    border-radius: var(--radius);
    background: hsl(var(--background));
    color: hsl(var(--muted-foreground));
    font-size: 13px; cursor: text; font-family: inherit;
    transition: border-color .12s ease, box-shadow .12s ease;
  }
  .cmdk:hover { border-color: hsl(var(--primary) / 0.5); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.06); }
  .cmdk svg { width: 15px; height: 15px; }
  .cmdk .ctxt { flex: 1; text-align: left; }
  .cmdk .kbd {
    font-family: inherit; font-size: 11px; font-weight: 600;
    color: hsl(var(--muted-foreground));
    background: hsl(var(--secondary));
    border: 1px solid hsl(var(--border));
    border-radius: 5px; padding: 1px 6px;
  }

  .icon-btn {
    position: relative;
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border: 1px solid transparent;
    border-radius: var(--radius);
    background: transparent;
    color: hsl(var(--muted-foreground));
    cursor: pointer;
    transition: background .12s ease, color .12s ease;
  }
  .icon-btn:hover { background: hsl(var(--accent)); color: hsl(var(--foreground)); }
  .icon-btn svg { width: 17px; height: 17px; stroke-width: 2; }
  .icon-btn .dot {
    position: absolute; top: 6px; right: 6px;
    width: 7px; height: 7px; border-radius: 999px;
    background: hsl(var(--destructive));
    border: 1.5px solid hsl(var(--background));
  }

  .role-switch {
    display: inline-flex; align-items: center; gap: 7px;
    height: 32px; padding: 0 10px 0 11px;
    border: 1px solid hsl(var(--input));
    border-radius: var(--radius);
    background: hsl(var(--background));
    font-size: 13px; font-weight: 500; cursor: pointer;
    color: hsl(var(--foreground)); font-family: inherit;
    transition: background .12s ease, border-color .12s ease;
  }
  .role-switch:hover { background: hsl(var(--accent)); }
  .role-switch svg { width: 14px; height: 14px; color: hsl(var(--muted-foreground)); }
  .role-switch .rs-cap { color: hsl(var(--muted-foreground)); font-weight: 400; }

  .user-chip {
    display: flex; align-items: center; gap: 9px;
    padding: 3px 6px 3px 3px;
    border-radius: 999px;
    cursor: pointer; border: none; background: transparent; font: inherit;
    transition: background .12s ease;
  }
  .user-chip:hover { background: hsl(var(--accent)); }
  .avatar {
    width: 28px; height: 28px; border-radius: 999px;
    background: linear-gradient(135deg, hsl(221 83% 53%), hsl(262 83% 58%));
    color: #fff; display: grid; place-items: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .avatar.sm { width: 22px; height: 22px; font-size: 9.5px; }
  .user-chip .uname { font-size: 13px; font-weight: 600; line-height: 1.1; text-align: left; }
  .user-chip .urole { font-size: 11px; color: hsl(var(--muted-foreground)); line-height: 1.1; text-align: left; }

  /* ---------- ROW 2 : WORKSPACE TAB STRIP (from IA-2) ---------- */
  .tabstrip {
    grid-area: tabstrip;
    background: hsl(var(--secondary) / 0.5);
    border-bottom: 1px solid hsl(var(--border));
    display: flex; align-items: stretch;
    padding: 0 8px; gap: 0;
    overflow-x: auto;
    z-index: 20;
  }
  .ws-tab {
    display: inline-flex; align-items: center; gap: 8px;
    height: var(--tabstrip-h); padding: 0 10px 0 12px;
    border-right: 1px solid hsl(var(--border));
    font-size: 13px; color: hsl(var(--muted-foreground));
    cursor: pointer; white-space: nowrap; max-width: 240px;
    background: transparent; border-top: 2px solid transparent;
    font-family: inherit;
    transition: background .12s ease, color .12s ease;
  }
  .ws-tab:first-child { border-left: 1px solid hsl(var(--border)); }
  .ws-tab:hover { background: hsl(var(--accent) / 0.6); color: hsl(var(--foreground)); }
  .ws-tab.active {
    background: hsl(var(--background));
    color: hsl(var(--foreground)); font-weight: 600;
    border-top-color: hsl(var(--primary));
  }
  .ws-tab .wt-ico { width: 15px; height: 15px; display: grid; place-items: center; flex-shrink: 0; }
  .ws-tab .wt-ico svg { width: 15px; height: 15px; stroke-width: 2; }
  .ws-tab .wt-code { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .ws-tab .wt-label { overflow: hidden; text-overflow: ellipsis; }
  .ws-tab .wt-close {
    width: 18px; height: 18px; border-radius: 4px;
    display: grid; place-items: center; flex-shrink: 0;
    color: hsl(var(--muted-foreground)); opacity: 0;
    transition: opacity .12s ease, background .12s ease;
  }
  .ws-tab:hover .wt-close, .ws-tab.active .wt-close { opacity: .8; }
  .ws-tab .wt-close:hover { background: hsl(var(--secondary)); color: hsl(var(--foreground)); opacity: 1; }
  .ws-tab .wt-close svg { width: 12px; height: 12px; stroke-width: 2.5; }
  .ws-tab .wt-dirty { width: 7px; height: 7px; border-radius: 999px; background: hsl(var(--warning)); flex-shrink: 0; }
  .tab-newbtn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: var(--tabstrip-h);
    color: hsl(var(--muted-foreground)); background: transparent; border: none;
    cursor: pointer; transition: color .12s ease, background .12s ease;
  }
  .tab-newbtn:hover { color: hsl(var(--foreground)); background: hsl(var(--accent) / 0.6); }
  .tab-newbtn svg { width: 16px; height: 16px; stroke-width: 2; }

  /* =========================================================
     MAIN SCROLL AREA
     ========================================================= */
  .main {
    grid-area: main;
    overflow-y: auto;
    overflow-x: hidden;
    background: hsl(var(--secondary) / 0.35);
  }
  .main-inner { padding: 20px 24px 64px; max-width: 1600px; margin: 0 auto; }

  /* Back affordance (the page-drill return, distinct from breadcrumb) */
  .backbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 7px;
    height: 30px; padding: 0 11px 0 8px;
    border: 1px solid hsl(var(--input)); border-radius: var(--radius);
    background: hsl(var(--background)); color: hsl(var(--foreground));
    font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
    transition: background .12s ease;
  }
  .back-btn:hover { background: hsl(var(--accent)); }
  .back-btn:active { transform: translateY(1px); }
  .back-btn svg { width: 15px; height: 15px; stroke-width: 2; }

  .page-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .page-sub { font-size: 13.5px; color: hsl(var(--muted-foreground)); margin-top: 2px; max-width: 80ch; }
  .page-head-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  /* ---------- Buttons (from reference) ---------- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    height: 32px; padding: 0 12px;
    font-size: 14px; font-weight: 500;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer; white-space: nowrap;
    transition: background .12s ease, border-color .12s ease, color .12s ease, box-shadow .12s ease, transform .05s ease;
    user-select: none; font-family: inherit;
  }
  .btn:active { transform: translateY(1px); }
  .btn svg { width: 15px; height: 15px; stroke-width: 2; flex-shrink: 0; }
  .btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); box-shadow: 0 1px 2px hsl(var(--primary) / 0.25); }
  .btn-primary:hover { background: hsl(var(--primary) / 0.9); }
  .btn-outline { border-color: hsl(var(--input)); background: hsl(var(--background)); color: hsl(var(--foreground)); }
  .btn-outline:hover { background: hsl(var(--accent)); }
  .btn-ghost { background: transparent; color: hsl(var(--foreground)); }
  .btn-ghost:hover { background: hsl(var(--accent)); }
  .btn-success { background: hsl(var(--success)); color: hsl(var(--success-foreground)); }
  .btn-success:hover { background: hsl(var(--success) / 0.9); }
  .btn-destructive { background: hsl(var(--destructive)); color: hsl(var(--destructive-foreground)); }
  .btn-destructive:hover { background: hsl(var(--destructive) / 0.9); }
  .btn-sm { height: 28px; padding: 0 9px; font-size: 13px; }
  .btn:disabled, .btn[disabled] { opacity: .45; cursor: not-allowed; pointer-events: none; }

  /* =========================================================
     KPI BAND — COPIED VERBATIM from reference
     ========================================================= */
  .kpi-band { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 16px; }
  .kpi-band.six { grid-template-columns: repeat(6, 1fr); }
  .kpi {
    background: hsl(var(--card)); border: 1px solid hsl(var(--border));
    border-radius: var(--radius); padding: 16px 16px 14px;
    display: flex; flex-direction: column; gap: 10px; min-width: 0; position: relative;
    transition: box-shadow .14s ease, border-color .14s ease;
  }
  .kpi:hover { box-shadow: 0 2px 10px hsl(240 6% 10% / 0.06); }
  .kpi-top { display: flex; align-items: center; gap: 8px; }
  .kpi-ico { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex-shrink: 0; }
  .kpi-ico svg { width: 16px; height: 16px; stroke-width: 2; }
  .kpi-ico.blue   { background: hsl(221 83% 53% / 0.12); color: hsl(221 83% 53%); }
  .kpi-ico.violet { background: hsl(262 83% 58% / 0.12); color: hsl(262 83% 58%); }
  .kpi-ico.amber  { background: hsl(var(--warning) / 0.18); color: hsl(var(--warning-foreground)); }
  .kpi-ico.red    { background: hsl(var(--destructive) / 0.12); color: hsl(var(--destructive)); }
  .kpi-ico.green  { background: hsl(var(--success) / 0.13); color: hsl(var(--success)); }
  .kpi-ico.cyan   { background: hsl(199 89% 48% / 0.13); color: hsl(199 89% 42%); }
  .kpi-label { font-size: 12.5px; font-weight: 500; color: hsl(var(--muted-foreground)); }
  .kpi-help { margin-left: auto; width: 15px; height: 15px; color: hsl(var(--muted-foreground)); opacity: .55; cursor: help; display: grid; place-items: center; }
  .kpi-help:hover { opacity: 1; }
  .kpi-help svg { width: 14px; height: 14px; }
  .kpi-val { font-size: 23px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .kpi-val.neg { color: hsl(var(--destructive)); }
  .kpi-foot { display: flex; align-items: center; gap: 7px; font-size: 12px; }
  .kpi-delta { display: inline-flex; align-items: center; gap: 3px; font-weight: 600; padding: 1px 6px; border-radius: 999px; }
  .kpi-delta svg { width: 12px; height: 12px; stroke-width: 2.5; }
  .kpi-delta.up   { color: hsl(var(--success)); background: hsl(var(--success) / 0.12); }
  .kpi-delta.down { color: hsl(var(--destructive)); background: hsl(var(--destructive) / 0.1); }
  .kpi-delta.neutral { color: hsl(var(--muted-foreground)); background: hsl(var(--secondary)); }
  .kpi-foot .vs { color: hsl(var(--muted-foreground)); }
  .kpi .dual-toggle { display: inline-flex; align-items: center; height: 22px; padding: 1px; background: hsl(var(--secondary)); border-radius: 6px; margin-left: auto; }
  .kpi .dual-toggle button { height: 20px; padding: 0 8px; font-size: 11px; font-weight: 600; border: none; background: transparent; color: hsl(var(--muted-foreground)); border-radius: 5px; cursor: pointer; font-family: inherit; }
  .kpi .dual-toggle button.on { background: hsl(var(--background)); color: hsl(var(--foreground)); box-shadow: 0 1px 2px hsl(240 6% 10% / 0.1); }

  /* =========================================================
     SECTION / CARD primitives
     ========================================================= */
  .section { margin-bottom: 18px; }
  .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .section-head .sh-spacer { flex: 1; }
  .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); }
  .card.clip { overflow: hidden; }
  .card-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; border-bottom: 1px solid hsl(var(--border)); }
  .card-head h3 { font-size: 14px; font-weight: 600; }
  .card-head .ch-spacer { flex: 1; }
  .card-pad { padding: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  /* ---------- Action toolbar (from reference) ---------- */
  .toolbar { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius) var(--radius) 0 0; border-bottom: none; padding: 10px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar.standalone { border-radius: var(--radius); border-bottom: 1px solid hsl(var(--border)); margin-bottom: 14px; }
  .control { display: inline-flex; align-items: center; gap: 7px; height: 32px; padding: 0 10px; font-size: 13.5px; border: 1px solid hsl(var(--input)); border-radius: var(--radius); background: hsl(var(--background)); color: hsl(var(--foreground)); cursor: pointer; white-space: nowrap; user-select: none; font-family: inherit; transition: background .12s ease, border-color .12s ease; }
  .control:hover { background: hsl(var(--accent)); }
  .control svg { width: 15px; height: 15px; stroke-width: 2; color: hsl(var(--muted-foreground)); }
  .control .cval { font-weight: 600; }
  .control .cap { color: hsl(var(--muted-foreground)); font-weight: 400; }
  .control .chev { margin-left: 1px; opacity: .7; }
  .seg { display: inline-flex; align-items: center; height: 32px; padding: 2px; background: hsl(var(--secondary)); border-radius: var(--radius); gap: 2px; }
  .seg button { height: 28px; padding: 0 11px; font-size: 13px; font-weight: 500; border: none; background: transparent; color: hsl(var(--muted-foreground)); border-radius: calc(var(--radius) - 3px); cursor: pointer; white-space: nowrap; font-family: inherit; transition: background .12s ease, color .12s ease, box-shadow .12s ease; display: inline-flex; align-items: center; gap: 6px; }
  .seg button svg { width: 14px; height: 14px; stroke-width: 2; }
  .seg button:hover { color: hsl(var(--foreground)); }
  .seg button.on { background: hsl(var(--background)); color: hsl(var(--foreground)); font-weight: 600; box-shadow: 0 1px 2px hsl(240 6% 10% / 0.1); }
  .toolbar-spacer { flex: 1; }
  .search-mini { display: flex; align-items: center; gap: 7px; height: 32px; padding: 0 10px; border: 1px solid hsl(var(--input)); border-radius: var(--radius); background: hsl(var(--background)); min-width: 190px; }
  .search-mini svg { width: 15px; height: 15px; color: hsl(var(--muted-foreground)); flex-shrink: 0; }
  .search-mini input { border: none; outline: none; background: transparent; font-size: 13.5px; font-family: inherit; width: 100%; color: hsl(var(--foreground)); }
  .search-mini input::placeholder { color: hsl(var(--muted-foreground)); }

  /* =========================================================
     DATA TABLE — from reference (with IA-1's RICH ROWS)
     ========================================================= */
  .table-wrap { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
  .table-wrap.standalone { border-radius: var(--radius); }
  .table-scroll { overflow-x: auto; }
  table.grid { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  table.grid thead th {
    position: sticky; top: 0; background: hsl(var(--card)); height: 38px; text-align: left;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
    color: hsl(var(--muted-foreground)); padding: 0 12px;
    border-bottom: 1px solid hsl(var(--border)); white-space: nowrap; user-select: none; z-index: 2;
  }
  th.num, td.num { text-align: right; }
  th.center, td.center { text-align: center; }
  table.grid tbody td { height: 56px; padding: 8px 12px; border-bottom: 1px solid hsl(var(--border) / 0.7); vertical-align: middle; white-space: nowrap; }
  table.grid tbody tr:last-child td { border-bottom: none; }
  table.grid tbody tr.row { cursor: pointer; transition: background .1s ease; }
  table.grid tbody tr.row:hover { background: hsl(var(--accent) / 0.6); }
  table.grid tbody tr.row:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: -2px; }
  .proj { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .proj-ico { width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; flex-shrink: 0; font-size: 12px; font-weight: 700; color: #fff; }
  .proj-meta { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .proj-name { font-weight: 600; font-size: 13.5px; line-height: 1.25; }
  .proj-code { font-size: 11.5px; color: hsl(var(--muted-foreground)); line-height: 1.2; }
  .pc-id { font-family: "JetBrains Mono", ui-monospace, monospace; }
  td .money { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; font-weight: 500; }
  td .money.sub { color: hsl(var(--muted-foreground)); font-weight: 400; }

  .table-foot { display: flex; align-items: center; gap: 16px; padding: 11px 14px; border-top: 1.5px solid hsl(var(--border)); background: hsl(var(--secondary) / 0.4); font-size: 13px; flex-wrap: wrap; }
  .table-foot .foot-label { color: hsl(var(--muted-foreground)); font-weight: 500; }
  .table-foot .foot-val { font-weight: 700; font-variant-numeric: tabular-nums; }
  .table-foot .foot-spacer { flex: 1; }

  /* ---------- INLINE LIFECYCLE PIPS (IA-1's rich-row signature) ---------- */
  .lifecycle { display: inline-flex; align-items: center; }
  .lc-pip { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; background: hsl(var(--secondary)); }
  .lc-pip.done { background: hsl(var(--primary)); }
  .lc-pip.paid { background: hsl(var(--success)); }
  .lc-pip.current { background: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.18); }
  .lc-link { display: inline-block; width: 10px; height: 2px; background: hsl(var(--border)); vertical-align: middle; }
  .lc-link.on { background: hsl(var(--primary) / 0.5); }

  /* =========================================================
     STATUS / PHASE BADGES — from reference
     ========================================================= */
  .status { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px 0 8px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .status .sdot { width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
  .status.open    { background: hsl(221 83% 53% / 0.1); color: hsl(221 70% 45%); }
  .status.open .sdot { background: hsl(221 83% 53%); }
  .status.won     { background: hsl(var(--success) / 0.12); color: hsl(142 64% 30%); }
  .status.won .sdot { background: hsl(var(--success)); }
  .status.lost    { background: hsl(var(--destructive) / 0.1); color: hsl(0 72% 45%); }
  .status.lost .sdot { background: hsl(var(--destructive)); }
  .status.overdue, .status.warn { background: hsl(var(--warning) / 0.18); color: hsl(var(--warning-foreground)); }
  .status.overdue .sdot, .status.warn .sdot { background: hsl(38 92% 50%); }
  .status.neutral { background: hsl(var(--secondary)); color: hsl(var(--muted-foreground)); }
  .status.neutral .sdot { background: hsl(var(--muted-foreground)); }
  .status.draft { background: hsl(var(--secondary)); color: hsl(var(--secondary-foreground)); }
  .status.draft .sdot { background: hsl(var(--muted-foreground)); }

  /* win% chip + bar — from reference */
  .winp { display: inline-flex; align-items: center; gap: 8px; min-width: 120px; }
  .pbar { flex: 1; height: 7px; border-radius: 999px; background: hsl(var(--secondary)); overflow: hidden; min-width: 70px; }
  .pbar i { display: block; height: 100%; border-radius: 999px; }
  .winp-val { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; width: 40px; text-align: right; }

  /* owner mini chip (IA-1) */
  .owner-mini { display: inline-flex; align-items: center; gap: 8px; }
  .owner-name { font-size: 13px; font-weight: 500; }

  /* =========================================================
     DASHBOARD charts
     ========================================================= */
  .cat-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; display: inline-block; }
  .bvac-chart { width: 100%; height: 230px; }
  .donut-wrap { display: flex; align-items: center; gap: 20px; padding: 6px 4px; }
  .donut-legend { display: flex; flex-direction: column; gap: 9px; flex: 1; }
  .dl-item { display: flex; align-items: center; gap: 9px; font-size: 12.5px; }
  .dl-item .dl-name { flex: 1; }
  .dl-item .dl-val { font-weight: 700; font-variant-numeric: tabular-nums; }

  /* =========================================================
     KANBAN (from reference; 6 stages)
     ========================================================= */
  .kanban-scroll { overflow-x: auto; padding-bottom: 6px; }
  .kanban { display: grid; grid-auto-flow: column; grid-auto-columns: minmax(258px, 1fr); gap: 13px; min-width: 0; }
  .kcol { background: hsl(var(--secondary) / 0.5); border: 1px solid hsl(var(--border)); border-radius: var(--radius); display: flex; flex-direction: column; min-width: 0; }
  .kcol-head { padding: 11px 12px 10px; border-bottom: 1px solid hsl(var(--border)); position: sticky; top: 0; background: hsl(240 5% 96% / 0.95); backdrop-filter: blur(4px); border-radius: var(--radius) var(--radius) 0 0; z-index: 1; }
  .kcol-head-top { display: flex; align-items: center; gap: 8px; }
  .kcol-stagedot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .kcol-title { font-size: 13px; font-weight: 700; letter-spacing: -0.01em; }
  .kcol-prob { font-size: 10.5px; font-weight: 700; color: hsl(var(--muted-foreground)); background: hsl(var(--background)); border: 1px solid hsl(var(--border)); padding: 0 6px; height: 17px; border-radius: 999px; display: inline-grid; place-items: center; }
  .kcol-count { margin-left: auto; font-size: 11.5px; font-weight: 700; background: hsl(var(--background)); border: 1px solid hsl(var(--border)); color: hsl(var(--muted-foreground)); min-width: 22px; height: 20px; padding: 0 7px; border-radius: 999px; display: inline-grid; place-items: center; }
  .kcol-sub { display: flex; align-items: baseline; gap: 7px; margin-top: 7px; }
  .kcol-total { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .kcol-weighted { font-size: 11px; color: hsl(var(--muted-foreground)); cursor: help; }
  .kcol-body { padding: 9px; display: flex; flex-direction: column; gap: 9px; overflow-y: auto; min-height: 60px; }
  .kcard { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 11px; cursor: pointer; position: relative; box-shadow: 0 1px 2px hsl(240 6% 10% / 0.04); transition: box-shadow .14s ease, border-color .14s ease, transform .05s ease; }
  .kcard:hover { box-shadow: 0 4px 14px hsl(240 6% 10% / 0.1); border-color: hsl(var(--muted-foreground) / 0.35); }
  .kcard:active { transform: scale(.992); }
  .kcard:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }
  .kcard-top { display: flex; align-items: flex-start; gap: 9px; }
  .kcard-ico { width: 26px; height: 26px; border-radius: 6px; display: grid; place-items: center; flex-shrink: 0; font-size: 11px; font-weight: 700; color: #fff; }
  .kcard-name { font-size: 13px; font-weight: 600; line-height: 1.25; }
  .kcard-cust { font-size: 11.5px; color: hsl(var(--muted-foreground)); line-height: 1.2; margin-top: 1px; }
  .kcard-val { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; margin: 9px 0 4px; }
  .kcard-wtd { font-size: 11px; color: hsl(var(--muted-foreground)); margin-bottom: 8px; }
  .kcard-foot { display: flex; align-items: center; gap: 8px; margin-top: 9px; padding-top: 9px; border-top: 1px solid hsl(var(--border) / 0.7); }
  .kcard-foot .kf-spacer { flex: 1; }
  .kcard-ref { font-size: 10.5px; color: hsl(var(--muted-foreground)); font-family: "JetBrains Mono", ui-monospace, monospace; }
  .kcard-date { font-size: 10.5px; color: hsl(var(--muted-foreground)); display: inline-flex; align-items: center; gap: 4px; }
  .kcard-date svg { width: 11px; height: 11px; }

  /* weighted funnel summary band */
  .funnel { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; margin-bottom: 14px; }
  .fstage { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-right: none; padding: 13px 14px 12px; position: relative; min-width: 0; }
  .fstage:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .fstage:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-right: 1px solid hsl(var(--border)); }
  .fstage-top { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
  .fstage-dot { width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .fstage-name { font-size: 12px; font-weight: 600; }
  .fstage-prob { margin-left: auto; font-size: 10px; font-weight: 700; color: hsl(var(--muted-foreground)); }
  .fstage-val { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1; }
  .fstage-wtd { display: flex; align-items: center; gap: 5px; margin-top: 7px; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .fstage-bar { height: 5px; border-radius: 999px; margin-top: 8px; overflow: hidden; background: hsl(var(--secondary)); }
  .fstage-bar i { display: block; height: 100%; border-radius: 999px; }

  /* =========================================================
     PROCUREMENT by-stage BOARD (kanban-like, grouped by lifecycle)
     ========================================================= */
  .prcard-meta { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-top: 2px; }

  /* =========================================================
     PROCUREMENT LIFECYCLE STEPPER (full page detail)
     ========================================================= */
  .stepper { display: flex; align-items: flex-start; padding: 18px 8px 6px; overflow-x: auto; }
  .pstep { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; min-width: 96px; position: relative; }
  .pstep:not(:last-child)::after { content: ""; position: absolute; top: 15px; left: calc(50% + 18px); right: calc(-50% + 18px); height: 2px; background: hsl(var(--border)); }
  .pstep.done:not(:last-child)::after { background: hsl(var(--success)); }
  .pstep-node { width: 32px; height: 32px; border-radius: 999px; display: grid; place-items: center; background: hsl(var(--background)); border: 2px solid hsl(var(--border)); color: hsl(var(--muted-foreground)); font-size: 12px; font-weight: 700; z-index: 1; }
  .pstep-node svg { width: 15px; height: 15px; stroke-width: 2.5; }
  .pstep.done .pstep-node { background: hsl(var(--success)); border-color: hsl(var(--success)); color: hsl(var(--success-foreground)); }
  .pstep.current .pstep-node { background: hsl(var(--primary)); border-color: hsl(var(--primary)); color: hsl(var(--primary-foreground)); box-shadow: 0 0 0 4px hsl(var(--primary) / 0.15); }
  .pstep.skipped .pstep-node { border-style: dashed; background: hsl(var(--secondary)); }
  .pstep-label { font-size: 11.5px; font-weight: 600; text-align: center; line-height: 1.2; }
  .pstep.upcoming .pstep-label { color: hsl(var(--muted-foreground)); }
  .pstep-ref { font-size: 10px; font-family: "JetBrains Mono", ui-monospace, monospace; color: hsl(var(--muted-foreground)); }
  .pstep-skip { font-size: 9.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: hsl(var(--muted-foreground)); }

  /* SoD gate notice */
  .gate { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius); font-size: 13px; }
  .gate svg { width: 17px; height: 17px; flex-shrink: 0; margin-top: 1px; }
  .gate.blocked { background: hsl(var(--warning) / 0.12); border: 1px solid hsl(var(--warning) / 0.4); color: hsl(var(--warning-foreground)); }
  .gate.blocked svg { color: hsl(38 92% 45%); }
  .gate.ready { background: hsl(var(--success) / 0.1); border: 1px solid hsl(var(--success) / 0.35); color: hsl(142 64% 28%); }
  .gate.ready svg { color: hsl(var(--success)); }
  .gate b { font-weight: 700; }

  /* mini stat tiles */
  .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: hsl(var(--border)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); overflow: hidden; }
  .stat { background: hsl(var(--card)); padding: 13px 14px; }
  .stat-label { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-bottom: 4px; }
  .stat-val { font-size: 17px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .stat-val.pos { color: hsl(var(--success)); }
  .stat-val.neg { color: hsl(var(--destructive)); }
  .stat-sub { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 2px; }

  /* version pill */
  .vpill { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .vpill svg { width: 12px; height: 12px; }
  .vpill.active { background: hsl(var(--success) / 0.12); color: hsl(142 64% 30%); }
  .vpill.draft { background: hsl(var(--warning) / 0.16); color: hsl(var(--warning-foreground)); }
  .vpill.archived { background: hsl(var(--secondary)); color: hsl(var(--muted-foreground)); }

  /* project detail header card */
  .phead { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 16px; }
  .phead-top { display: flex; align-items: flex-start; gap: 14px; }
  .phead-ico { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 17px; flex-shrink: 0; }
  .phead-name { font-size: 19px; font-weight: 700; letter-spacing: -0.02em; }
  .phead-meta { font-size: 12.5px; color: hsl(var(--muted-foreground)); margin-top: 2px; }
  .phead-stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; margin-top: 16px; padding-top: 16px; border-top: 1px solid hsl(var(--border)); }
  .ph-stat .ph-l { font-size: 11.5px; color: hsl(var(--muted-foreground)); margin-bottom: 3px; }
  .ph-stat .ph-v { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  /* in-page tabs (within a full detail page) */
  .ptabs { display: flex; gap: 2px; border-bottom: 1px solid hsl(var(--border)); margin-bottom: 16px; }
  .ptab { height: 38px; padding: 0 14px; font-size: 13.5px; font-weight: 500; color: hsl(var(--muted-foreground)); background: transparent; border: none; cursor: pointer; position: relative; font-family: inherit; }
  .ptab:hover { color: hsl(var(--foreground)); }
  .ptab.active { color: hsl(var(--primary)); font-weight: 600; }
  .ptab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: hsl(var(--primary)); }

  /* project CARDS view */
  .pcards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .pcard { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 16px; cursor: pointer; transition: box-shadow .14s ease, border-color .14s ease, transform .05s ease; box-shadow: 0 1px 2px hsl(240 6% 10% / 0.04); }
  .pcard:hover { box-shadow: 0 4px 14px hsl(240 6% 10% / 0.1); border-color: hsl(var(--muted-foreground) / 0.35); }
  .pcard:active { transform: scale(.995); }
  .pcard:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }
  .pcard-top { display: flex; align-items: flex-start; gap: 11px; margin-bottom: 13px; }
  .pcard-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12.5px; }
  .pcard-row .pl { color: hsl(var(--muted-foreground)); }
  .pcard-row .pv { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* =========================================================
     TIMESHEET GRID
     ========================================================= */
  table.tsgrid { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.tsgrid th { background: hsl(var(--card)); height: 40px; font-size: 11.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; color: hsl(var(--muted-foreground)); padding: 0 12px; border-bottom: 1px solid hsl(var(--border)); text-align: center; }
  table.tsgrid th:first-child { text-align: left; min-width: 220px; }
  table.tsgrid th.weekend { background: hsl(var(--secondary) / 0.6); }
  table.tsgrid td { height: 48px; padding: 0 8px; border-bottom: 1px solid hsl(var(--border) / 0.7); text-align: center; }
  table.tsgrid td:first-child { text-align: left; padding: 0 12px; }
  table.tsgrid td.weekend { background: hsl(var(--secondary) / 0.4); }
  .ts-cell { width: 52px; height: 32px; margin: 0 auto; border: 1px solid hsl(var(--input)); border-radius: 6px; background: hsl(var(--background)); display: grid; place-items: center; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; cursor: text; transition: border-color .12s ease, box-shadow .12s ease; }
  .ts-cell:hover { border-color: hsl(var(--primary) / 0.5); }
  .ts-cell:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 1px; }
  .ts-cell.empty { color: hsl(var(--muted-foreground) / 0.5); font-weight: 400; }
  .ts-cell.filled { background: hsl(var(--primary) / 0.07); border-color: hsl(var(--primary) / 0.25); color: hsl(var(--primary)); }
  .ts-total { font-weight: 700; font-variant-numeric: tabular-nums; }
  .ts-foot td { background: hsl(var(--secondary) / 0.4); font-weight: 700; border-top: 1.5px solid hsl(var(--border)); }

  /* =========================================================
     EMPTY / LOADING / ERROR STATES
     ========================================================= */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 56px 24px; text-align: center; }
  .empty-ico { width: 52px; height: 52px; border-radius: 14px; background: hsl(var(--secondary)); display: grid; place-items: center; color: hsl(var(--muted-foreground)); }
  .empty-ico svg { width: 24px; height: 24px; stroke-width: 1.75; }
  .empty-title { font-size: 15px; font-weight: 600; }
  .empty-sub { font-size: 13px; color: hsl(var(--muted-foreground)); max-width: 44ch; }

  .err-banner { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: var(--radius); background: hsl(var(--destructive) / 0.07); border: 1px solid hsl(var(--destructive) / 0.3); margin-bottom: 16px; }
  .err-banner svg { width: 20px; height: 20px; color: hsl(var(--destructive)); flex-shrink: 0; }
  .err-banner .eb-body { flex: 1; }
  .err-banner .eb-title { font-size: 13.5px; font-weight: 600; color: hsl(0 72% 42%); }
  .err-banner .eb-sub { font-size: 12.5px; color: hsl(var(--muted-foreground)); margin-top: 1px; }

  /* skeleton */
  .skel { background: linear-gradient(90deg, hsl(var(--secondary)) 25%, hsl(var(--muted) / 0.5) 50%, hsl(var(--secondary)) 75%); background-size: 200% 100%; animation: shimmer 1.4s ease infinite; border-radius: 6px; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skel-line { height: 12px; margin: 7px 0; }

  /* =========================================================
     COMMAND PALETTE OVERLAY (⌘K) — from IA-2
     ========================================================= */
  #cmdk-overlay { position: fixed; inset: 0; z-index: 950; display: none; align-items: flex-start; justify-content: center; padding-top: 12vh; background: hsl(240 10% 4% / 0.4); backdrop-filter: blur(3px); }
  #cmdk-overlay.show { display: flex; }
  .cmdk-panel { width: 100%; max-width: 600px; background: hsl(var(--popover)); border: 1px solid hsl(var(--border)); border-radius: 12px; box-shadow: 0 24px 60px hsl(240 10% 4% / 0.35); overflow: hidden; animation: cmdkin .14s ease; }
  @keyframes cmdkin { from { opacity: 0; transform: translateY(-8px) scale(.98); } to { opacity: 1; transform: none; } }
  .cmdk-input-row { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid hsl(var(--border)); }
  .cmdk-input-row svg { width: 18px; height: 18px; color: hsl(var(--muted-foreground)); }
  .cmdk-input-row input { flex: 1; border: none; outline: none; background: transparent; font-size: 15px; font-family: inherit; color: hsl(var(--foreground)); }
  .cmdk-input-row input::placeholder { color: hsl(var(--muted-foreground)); }
  .cmdk-input-row .esc { font-size: 11px; font-weight: 600; color: hsl(var(--muted-foreground)); background: hsl(var(--secondary)); border: 1px solid hsl(var(--border)); border-radius: 5px; padding: 2px 7px; }
  .cmdk-list { max-height: 380px; overflow-y: auto; padding: 6px; }
  .cmdk-group { font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: hsl(var(--muted-foreground)); padding: 10px 10px 5px; }
  .cmdk-row { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 7px; cursor: pointer; font-size: 14px; }
  .cmdk-row:hover, .cmdk-row.sel { background: hsl(var(--accent)); }
  .cmdk-row .cr-ico { width: 28px; height: 28px; border-radius: 7px; background: hsl(var(--secondary)); display: grid; place-items: center; flex-shrink: 0; color: hsl(var(--muted-foreground)); }
  .cmdk-row .cr-ico svg { width: 15px; height: 15px; stroke-width: 2; }
  .cmdk-row .cr-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .cmdk-row .cr-title { font-weight: 500; line-height: 1.2; }
  .cmdk-row .cr-sub { font-size: 11.5px; color: hsl(var(--muted-foreground)); line-height: 1.2; }

  /* =========================================================
     TOOLTIP / TOAST (from reference)
     ========================================================= */
  #tip { position: fixed; z-index: 900; max-width: 280px; background: hsl(240 10% 8%); color: hsl(0 0% 98%); border: 1px solid hsl(240 6% 22%); border-radius: 7px; padding: 8px 11px; font-size: 12.5px; line-height: 1.45; box-shadow: 0 8px 24px hsl(240 10% 4% / 0.4); pointer-events: none; opacity: 0; transform: translateY(3px); transition: opacity .12s ease, transform .12s ease; white-space: normal; }
  #tip.show { opacity: 1; transform: translateY(0); }
  #tip .tip-h { font-weight: 700; margin-bottom: 3px; }
  #tip .tip-b { color: hsl(0 0% 80%); }
  #toast-wrap { position: fixed; bottom: 22px; right: 22px; z-index: 920; display: flex; flex-direction: column; gap: 9px; }
  .toast { display: flex; align-items: center; gap: 10px; background: hsl(var(--popover)); border: 1px solid hsl(var(--border)); border-left: 3px solid hsl(var(--primary)); border-radius: var(--radius); box-shadow: 0 10px 30px hsl(240 10% 8% / 0.16); padding: 11px 14px; font-size: 13.5px; min-width: 230px; max-width: 360px; animation: toastIn .2s ease; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .toast.out { animation: toastOut .2s ease forwards; }
  @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }
  .toast svg { width: 17px; height: 17px; flex-shrink: 0; color: hsl(var(--primary)); }
  .toast.ok { border-left-color: hsl(var(--success)); }
  .toast.ok svg { color: hsl(var(--success)); }
  .toast.warn { border-left-color: hsl(var(--warning)); }
  .toast.warn svg { color: hsl(38 92% 45%); }
  .toast b { font-weight: 600; }

  /* =========================================================
     RESPONSIVE — rail collapses on tablet/mobile
     ========================================================= */
  .mobile-only { display: none; }

  @media (max-width: 1180px) {
    .kpi-band, .kpi-band.six { grid-template-columns: repeat(3, 1fr); }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .funnel { grid-template-columns: repeat(3, 1fr); }
    .fstage { border-right: 1px solid hsl(var(--border)) !important; border-radius: var(--radius) !important; }
    .phead-stats { grid-template-columns: repeat(3, 1fr); gap: 16px; }
  }
  @media (max-width: 920px) {
    :root { --rail-w: 0px; }
    .app { grid-template-columns: 0 1fr; }
    .rail { display: none; }
    .mobile-only { display: inline-flex; }
    .main-inner { padding: 14px 12px 60px; }
    .kpi-band, .kpi-band.six { grid-template-columns: repeat(2, 1fr); }
    .cmdk { min-width: 0; width: 36px; padding: 0; justify-content: center; }
    .cmdk .ctxt, .cmdk .kbd { display: none; }
    .user-chip .uname, .user-chip .urole { display: none; }
    .role-switch .rs-cap, .role-switch .rs-name { display: none; }
    .phead-stats { grid-template-columns: repeat(2, 1fr); }
    .stat-row { grid-template-columns: 1fr 1fr; }
    .page-head-actions .btn .btxt { display: none; }
  }
  @media (max-width: 560px) {
    .kpi-band, .kpi-band.six { grid-template-columns: 1fr; }
    .funnel { grid-template-columns: 1fr 1fr; }
  }

  /* scrollbar + focus polish (from reference) */
  .main::-webkit-scrollbar, .table-scroll::-webkit-scrollbar, .kanban-scroll::-webkit-scrollbar, .kcol-body::-webkit-scrollbar, .tabstrip::-webkit-scrollbar, .rail-nav::-webkit-scrollbar { height: 9px; width: 9px; }
  .main::-webkit-scrollbar-thumb, .table-scroll::-webkit-scrollbar-thumb, .kanban-scroll::-webkit-scrollbar-thumb { background: hsl(240 5% 80%); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  :focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; border-radius: 4px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

  @media (prefers-reduced-motion: reduce) {
    .skel { animation: none; }
    *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
  }
</style>
</head>

/* =====================================================

   ===================================================== */
function renderTabs(){
  const strip = document.getElementById("tabstrip");
  strip.innerHTML = TABS.map(t=>`
    <div class="ws-tab ${t.id===activeTab?'active':''}" role="tab" tabindex="0"
         aria-selected="${t.id===activeTab}" data-tab="${t.id}">
      <span class="wt-ico" aria-hidden="true">${ICONS[t.icon]||ICONS.doc}</span>
      ${t.code?`<span class="wt-code">${t.code}</span>`:''}
      <span class="wt-label">${t.label}</span>
      ${t.dirty?'<span class="wt-dirty" title="Unsaved changes"></span>':''}
      ${t.kind!=='module'?`<span class="wt-close" role="button" aria-label="Close ${t.label}" data-close="${t.id}">${ICONS.x}</span>`:''}
    </div>`).join("") +
    `<button class="tab-newbtn" aria-label="Open command palette to add a tab" title="Open command palette (⌘K)">${ICONS.plus}</button>`;

  strip.querySelectorAll(".ws-tab").forEach(el=>{
    el.addEventListener("click", e=>{
      if(e.target.closest("[data-close]")){ closeTab(e.target.closest("[data-close]").dataset.close); return; }
      selectTab(el.dataset.tab);
    });
    el.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); selectTab(el.dataset.tab); }});
  });
  strip.querySelector(".tab-newbtn").addEventListener("click", openCmdk);
}

function selectTab(id){
  if(!TABS.find(t=>t.id===id)) return;
  activeTab = id;
  renderTabs();
  syncRail();
  renderActive();
  document.getElementById("main").scrollTop = 0;
}

function closeTab(id){
  const idx = TABS.findIndex(t=>t.id===id);
  TABS = TABS.filter(t=>t.id!==id);
  if(activeTab===id){ selectTab(TABS[Math.max(0,idx-1)].id); }
  else { renderTabs(); }
  toast("Tab closed","Removed from your workspace");
}

/* open a top-level module (index) as a tab */
function openModule(module){
  let t = TABS.find(x=>x.kind==='module' && x.module===module);
  if(!t){ const m=MODULE_META[module]; t = { id:module, kind:"module", module, icon:m.icon, label:m.label }; TABS.push(t); }
  selectTab(t.id);
}

/* open a record DETAIL as a tab (page-drill target) */
function openRecord(kind, rec){
  const id = (kind==='pr'?'pr:':'rec:')+rec.id;
  let t = TABS.find(x=>x.id===id);
  if(!t){ t = { id, kind, code:rec.id, icon: kind==='pr'?'cart':'folder', label: rec.label, payload: rec, dirty: kind==='pr' }; TABS.push(t); }
  selectTab(id);
}

/* the rail reflects which module the active tab belongs to */
function syncRail(){
  const t = TABS.find(x=>x.id===activeTab);
  const target = t.kind==='module' ? t.module : (t.kind==='record'?'project':'procurement');
  document.querySelectorAll(".rail-item[data-module]").forEach(n=>{
    const on = n.dataset.module===target;
    n.classList.toggle("active", on);
    if(on) n.setAttribute("aria-current","page"); else n.removeAttribute("aria-current");
  });
}

/* =====================================================
   BREADCRUMB (page-drill wayfinding — from IA-1's context bar)
   ===================================================== */
function setCrumb(parts){
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = parts.map((p,i)=>{
    const last = i===parts.length-1;
    const node = last
      ? `<span class="current">${p.label}</span>`
      : `<button data-go="${p.go||''}">${p.label}</button>`;
    return (i>0?`<span class="sep" aria-hidden="true">${ICONS.chev}</span>`:'') + node;
  }).join("");
  bc.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>{ if(b.dataset.go) openModule(b.dataset.go); }));
}

function renderCmdk(q){
  q=q.toLowerCase(); cmdkFlat=[]; cmdkSel=0;

  CMDK_DATA.forEach(grp=>{

      html+=`<div class="cmdk-row ${i===0?'sel':''}" role="option" aria-selected="${i===0}" data-i="${i}">

  document.getElementById("roleName").textContent=ROLES[roleIdx];
  document.getElementById("userRole").textContent=({Executive:"Managing Director","Project Manager":"Senior PM",Finance:"Cost Controller",Engineer:"Lead Engineer",Admin:"System Administrator"})[ROLES[roleIdx]];
  toast("Role switched",`Viewing as ${ROLES[roleIdx]}`,"ok");
});

/* =====================================================
   TOOLTIP / TOAST / GLOBAL EVENTS
   ===================================================== */
const tip=document.getElementById("tip");
function bindTips(){
  document.querySelectorAll("[data-tip]").forEach(el=>{
    if(el._t) return; el._t=1;
    const show=()=>{ tip.innerHTML=`<div class="tip-h">${el.dataset.tipH||''}</div><div class="tip-b">${el.dataset.tip}</div>`; const r=el.getBoundingClientRect(); tip.style.left=Math.min(r.left,innerWidth-300)+"px"; tip.style.top=(r.bottom+8)+"px"; tip.classList.add("show"); };
    const hide=()=>tip.classList.remove("show");
    el.addEventListener("mouseenter",show); el.addEventListener("mouseleave",hide);
    el.addEventListener("focus",show); el.addEventListener("blur",hide);
  });
}
function toast(title,body,kind=""){
  const w=document.getElementById("toast-wrap");
  const t=document.createElement("div"); t.className="toast "+kind; t.setAttribute("role","status");
  t.innerHTML=`${kind==='ok'?ICONS.check:kind==='warn'?ICONS.alert:ICONS.inbox}<div><b>${title}</b><div style="color:hsl(var(--muted-foreground));font-size:12.5px">${body}</div></div>`;
  w.appendChild(t); setTimeout(()=>{t.classList.add("out");setTimeout(()=>t.remove(),200);},3200);
}
window.toast=toast;

document.querySelectorAll(".rail-item[data-module]").forEach(n=>{
  n.addEventListener("click",()=>openModule(n.dataset.module));
});
document.getElementById("cmdkBtn").addEventListener("click",openCmdk);
document.getElementById("cmdkInput").addEventListener("input",e=>renderCmdk(e.target.value));
document.addEventListener("keydown",e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); openCmdk(); return; }
  if(e.key==="Escape") closeCmdk();
  if(document.getElementById("cmdk-overlay").classList.contains("show")){
    const rows=document.querySelectorAll(".cmdk-row");
    if(!rows.length) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); cmdkSel=Math.min(cmdkSel+1,rows.length-1); }
    if(e.key==="ArrowUp"){ e.preventDefault(); cmdkSel=Math.max(cmdkSel-1,0); }
    if(e.key==="Enter"){ e.preventDefault(); runCmdk(cmdkSel); return; }
    rows.forEach((r,i)=>{ r.classList.toggle("sel",i===cmdkSel); r.setAttribute("aria-selected",i===cmdkSel); });
    rows[cmdkSel]?.scrollIntoView({block:"nearest"});
  }
});
document.getElementById("cmdk-overlay").addEventListener("click",e=>{ if(e.target.id==="cmdk-overlay") closeCmdk(); });

/* ---- boot ---- */
renderTabs();
selectTab("dashboard");
</script>
