name: CI

on:
  push:
    branches: [main]
    # Skip CI on docs/markdown-only changes (no code/test/migration touched) — saves
    # the full Supabase+Playwright integration run on doc commits to main.
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  workflow_dispatch: {}

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR —
# avoids paying for superseded runs during iterative pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pmo-portal

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pmo-portal/package-lock.json
      - run: npm ci
      - name: Supply-chain audit (high+ severity)
        run: npm audit --audit-level=high
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (+ coverage)
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint:ci

  integration:
    # The expensive job (Supabase stack + pgTAP + full Playwright e2e, ~6 min). Run it on
    # PULL REQUESTS only — that's the authoritative pre-merge gate. A squash-merge to main
    # carries the exact PR-tested content, so re-running the full e2e on the main push is
    # redundant; the fast `verify` job still runs on main as a smoke. (Make this a REQUIRED
    # status check in branch protection so a red e2e can't be merged.)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        # supabase CLI must be run from repo root (where supabase/config.toml lives)
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: 2.104.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pmo-portal/package-lock.json

      - name: Install Node dependencies
        working-directory: pmo-portal
        run: npm ci

      # Docker is pre-installed on ubuntu-latest; storage + edge_runtime are disabled in
      # config.toml so the image pull is lighter.
      - name: Start local Supabase stack
        run: supabase start

      # Applies every migration in order and re-seeds from supabase/seed.sql so tests
      # always start from a clean, known state.
      - name: Reset DB (migrations + seed)
        run: supabase db reset --yes

      # pgTAP gate: 45 files / 180 tests — RLS, tenancy, SoD proofs.
      - name: pgTAP integration tests
        run: supabase test db

      # Extract the anon key + API URL from the local stack and write them into the file
      # pmo-portal/src/lib/supabase/client.ts reads at build/dev time.
      - name: Write .env.local for Vite / Playwright
        run: |
          eval "$(supabase status -o env)"
          echo "VITE_SUPABASE_URL=${API_URL}" > pmo-portal/.env.local
          echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}" >> pmo-portal/.env.local

      # Install only the Chromium browser (the single project defined in playwright.config.ts).
      - name: Install Playwright browsers
        working-directory: pmo-portal
        run: npx playwright install --with-deps chromium

      # The webServer in playwright.config.ts runs `npm run dev` (Vite dev server on :3000).
      # reuseExistingServer=false in CI so Playwright owns the lifecycle.
      - name: E2E tests (Playwright / Chromium)
        working-directory: pmo-portal
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: pmo-portal/playwright-report/
          retention-days: 7
