name: CI

on:
  push:
    # PUSH CI on `main` ONLY (post-merge smoke). `dev`/feature branches are intentionally
    # excluded: every change reaches them via a PR that already runs `verify`, and `dev` is
    # otherwise only force-synced to `main` (identical, already-gated content) — so a push
    # trigger there would just re-run `verify` on verified content. Net: `verify` runs once
    # per PR + one main post-merge smoke, not ~4× per change. (`integration` is PR→main only.)
    branches: [main]
    # Skip CI on docs/markdown-only changes (no code/test/migration touched).
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - 'scripts/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'review/**'
      - 'scripts/**'
      - '.claude/**'
      - '.codex/**'
      - '**/*.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'LICENSE'
  workflow_dispatch: {}

# Least privilege: the workflow only reads the repo (checkout + diff); it never writes
# contents, issues, PRs, or packages.
permissions:
  contents: read

# Cancel an in-progress run when a newer commit is pushed to the same branch/PR —
# avoids paying for superseded runs during iterative pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pmo-portal

# ─── CI TIERING (resource-lean) ─────────────────────────────────────────────────
# PR → dev    → `verify` only (typecheck · lint · unit tests · build). Fast lane.
# PR → main   → `verify` + `integration` (Supabase + pgTAP + Playwright e2e incl. the
#               visual-invariant gate AC-VISUAL-ICON-001 + mobile-overflow gate
#               AC-MOBILE-OVERFLOW-001). Authoritative pre-merge gate.
# push main   → `verify` smoke only (integration skipped — see its `if`).
# No push CI on dev/feature branches (PR-gated) → no duplicate `verify` runs.
# Integration trims: Playwright browsers cached + Supabase starts without the
# CI-unused containers (studio/realtime/vector).
# main→production → no CI; main is already pre-gated by the PR that merged it.
# ───────────────────────────────────────────────────────────────────────────────
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the changed-lines coverage gate can diff against the
          # PR base ref.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pmo-portal/package-lock.json
      - run: npm ci
      - name: Supply-chain audit — production deps (blocking)
        # Gate on vulnerabilities in code that SHIPS to users (the production dependency tree).
        # Build-time devDependencies (vite/esbuild/vitest/etc.) never enter the bundle, so an
        # advisory there must not hard-block unrelated shipping — they are audited non-blocking
        # below for visibility. Real build-tooling remediation (e.g. the Vite major bump that
        # patches esbuild GHSA-gv7w-rqvm-qjhr) is scheduled debt, done deliberately.
        run: npm audit --omit=dev --audit-level=high
      - name: Supply-chain audit — full tree incl. dev tooling (visibility, non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (+ coverage)
        run: npm run test:coverage
      - name: Changed-lines coverage gate (≥80%)
        if: github.event_name == 'pull_request'
        working-directory: .
        # BASE_REF is passed via env (not interpolated into the shell) so the
        # untrusted github.base_ref can't be shell-injected. fetch-depth: 0 above
        # already provides full history, so no extra --depth is needed.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          node scripts/changed-lines-coverage.mjs \
            --base "origin/$BASE_REF" \
            --coverage pmo-portal/coverage/coverage-final.json \
            --min 80
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint:ci
      - uses: denoland/setup-deno@v2
        with:
          # Pinned (not `latest`/`vx.x`) for deploy-check determinism — bump deliberately.
          deno-version: '2.7.11'
      # Gap: supabase/functions/** is outside tsc/ESLint (edge functions are Deno programs, not
      # part of the pmo-portal TS project). Each function has its own deno.json import map/deps.
      - name: Deno typecheck — edge function entry points + _shared
        working-directory: .
        run: |
          set -e
          for fn in agent-chat agent-dispatch compose-view admin-invite-user; do
            echo "── deno check supabase/functions/$fn/index.ts ──"
            deno check --config "supabase/functions/$fn/deno.json" "supabase/functions/$fn/index.ts"
          done
      # Boot smoke — `deno check` is type-only and Vitest resolves module-init order differently than
      # the real runtime, so a circular-import TDZ (or any top-level throw) can pass both yet crash the
      # deployed worker at boot (WORKER_ERROR). This imports each entrypoint's graph (Deno.serve stubbed)
      # and fails on any import-time throw. Regression guard for the 2026-07-04 agent-chat boot crash.
      - name: Deno boot smoke — edge function entry points load without throwing
        working-directory: .
        run: |
          set -e
          for fn in agent-chat agent-dispatch compose-view admin-invite-user; do
            echo "── boot-smoke supabase/functions/$fn/index.ts ──"
            deno run --allow-all --config "supabase/functions/$fn/deno.json" \
              scripts/deno-boot-smoke.ts "supabase/functions/$fn/index.ts"
          done

  integration:
    # The expensive job (Supabase stack + pgTAP + full Playwright e2e incl. visual-invariant
    # gate AC-VISUAL-ICON-001, ~6 min). Run it on PRs that TARGET main only — the authoritative
    # pre-merge gate. A squash-merge carries the PR-tested content; re-running on the main push
    # is redundant. PRs targeting dev get `verify` only (fast lane — see tiering comment above).
    # Make this a REQUIRED status check in branch protection so a red e2e can't be merged.
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        # supabase CLI must be run from repo root (where supabase/config.toml lives)
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v2
        with:
          version: 2.105.0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pmo-portal/package-lock.json

      - name: Install Node dependencies
        working-directory: pmo-portal
        run: npm ci

      # Docker is pre-installed on ubuntu-latest; storage + edge_runtime are disabled in
      # config.toml. Also exclude CI-unused containers to shave the stack-up time:
      # studio (web UI — headless CI), realtime (app has 0 realtime usage), vector (log
      # shipper). Kept: db/rest/auth/kong + storage (doc-upload e2e+pgTAP) + inbucket
      # (1 magic-link e2e, AC-AUTH-005).
      - name: Start local Supabase stack
        run: supabase start -x studio,realtime,vector

      # Applies every migration in order and re-seeds from supabase/seed.sql so tests
      # always start from a clean, known state.
      - name: Reset DB (migrations + seed)
        run: supabase db reset --yes

      # pgTAP gate (0001..0060) — RLS, tenancy, SoD proofs.
      - name: pgTAP integration tests
        run: supabase test db

      # Extract the anon key + API URL from the local stack and write them into the file
      # pmo-portal/src/lib/supabase/client.ts reads at build/dev time.
      - name: Write .env.local for Vite / Playwright
        run: |
          eval "$(supabase status -o env)"
          echo "VITE_SUPABASE_URL=${API_URL}" > pmo-portal/.env.local
          echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}" >> pmo-portal/.env.local
          # User-composed views (ADR-0036 I3–I5) are feature-flagged off by default; the
          # /views routes + "Compose with AI" affordance only render when these are 'true'.
          # The view e2e journeys (AC-VR-020, AC-VB-E01, AC-AS-022) need them ON in CI.
          echo "VITE_FEATURES_USERVIEWS=true" >> pmo-portal/.env.local
          echo "VITE_FEATURES_AI_COMPOSER=true" >> pmo-portal/.env.local
          # A2–A4 (ADR-0040): the in-app agent AssistantPanel (⌘J) is feature-flagged off by
          # default; the panel + its journeys only render when this is 'true'. The agent e2e
          # journeys (AC-AR-013, AC-AW-012, AC-CV-015) need it ON in CI.
          echo "VITE_FEATURES_AGENT_ASSISTANT=true" >> pmo-portal/.env.local
          # The ownership e2e (AC-VR-020) seeds two users via an admin client, reading these
          # from process.env (the local-stack service-role key is the well-known demo key —
          # ephemeral, not a production secret). Exported to GITHUB_ENV for the Playwright step.
          # The agent tenancy e2e (AC-AAN-036, AC-AGP-023) additionally build a second anon-key
          # client to prove "second user cannot see" — they read VITE_SUPABASE_ANON_KEY from
          # process.env, so it must be exported here too (not only written to .env.local for Vite).
          echo "::add-mask::${SERVICE_ROLE_KEY}"
          {
            echo "SUPABASE_URL=${API_URL}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}"
            echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}"
          } >> "$GITHUB_ENV"

      # Cache the Chromium binary across runs (the download is ~15s). System deps (apt)
      # don't persist across runner VMs, so they always run; only the binary download is
      # saved on a cache hit. Keyed on the lockfile so a Playwright bump busts the cache.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pmo-portal/package-lock.json') }}
      # Install only Chromium (the single project in playwright.config.ts): browsers on a
      # cache miss, system deps always.
      - name: Install Playwright (browsers on cache miss; system deps always)
        working-directory: pmo-portal
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      # The webServer in playwright.config.ts runs `npm run dev` (Vite dev server on :3000).
      # reuseExistingServer=false in CI so Playwright owns the lifecycle.
      - name: E2E tests (Playwright / Chromium)
        working-directory: pmo-portal
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: pmo-portal/playwright-report/
          retention-days: 7
