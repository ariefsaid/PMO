
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Inter variable webfont (ADR-0037): the single UI family, opsz 14..32 + 400/500/600.
         display=swap so system-ui renders instantly and swaps without a FOIT. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>PMO Portal</title>
    <!-- No-flash theme bootstrap (F2): apply the persisted / prefers-color-scheme
         theme BEFORE first paint so the canvas never flashes the wrong scheme.
         Synchronous + pre-module so it runs before <body> renders; the runtime
         useTheme hook keeps state in sync after hydration and CSS .dark does the rest. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (stored == null && prefersDark);
          var root = document.documentElement;
          if (dark) root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (e) {
          /* localStorage / matchMedia unavailable — default to light (no class). */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
